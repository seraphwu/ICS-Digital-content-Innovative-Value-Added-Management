<p><strong>每一集的主題，都找到各自的視覺形式來承載。</strong></p>
<div class="case-study">
🎥 <b>風格多樣性觀察：</b><br />
1. <b>《目擊者》(The Witness)</b>：色澤濃郁的賽博龐克，強化懸疑與不安感。<br />
2. <b>《茲瑪藍》(Zima Blue)</b>：極簡的幾何色塊，對應哲學性的自我追尋。<br />
3. <b>《幸運 13》(Lucky 13)</b>：極致寫實的 3D，傳達戰爭與機械的重量感。
</div>
<p><strong>如果我們完全不設定，任由 AI 生成，產出的「預設風格」，那就是數位罐頭垃圾。</strong></p>

<h2 id="%E5%BB%BA%E7%AB%8B%E8%A8%AD%E8%A8%88%E7%B3%BB%E7%B5%B1style-guide">建立「設計系統」(Style Guide)</h2>
<p>在打開 AI 之前，請先在你們的雲端文件中定義好以下<strong>四個關鍵要素</strong>：</p>
<ol>
<li><strong>Moodboard (情緒板) 與 關鍵字</strong>：找 3 張最符合你們專案氛圍的參考圖，並用三個形容詞定義風格（如：復古、俐落、溫暖）。</li>
<li><strong>Color Palette (調色盤)</strong>：確定主色、輔助色與警示色，並標註 HEX 碼。</li>
<li><strong>Typography (字體)</strong>：標題與內文的字體選擇，確保易讀性。</li>
<li><strong>Iconography (圖示)</strong>：統一 Icon 的風格（如：細線條、扁平化、還是擬真化）。</li>
</ol>
<footer>20260507</footer>
</section>

<ul>
<li data-marpit-fragment="1"><strong>LINE 貼圖</strong>：
<ul>
<li data-marpit-fragment="2"><strong>觀察重點</strong>：線條的粗細是否一致？表情的誇張程度是否符合角色設定？</li>
<li data-marpit-fragment="3"><strong>調整任務</strong>：修正「AI 味」（例如過於複雜的陰影或不自然的肢體），使其更符合通訊軟體的簡潔調性。</li>
</ul>
</li>
<li data-marpit-fragment="4"><strong>遊戲設計</strong>：
<ul>
<li data-marpit-fragment="5"><strong>觀察重點</strong>：UI 介面與背景美術是否衝突？</li>
<li data-marpit-fragment="6"><strong>調整任務</strong>：定義統一的 UI 元件風格，確保玩家在激烈的遊戲過程中，能一眼分辨出「可互動按鈕」與「背景裝飾」。</li>
</ul>
</li>
</ul>
<footer>20260507</footer>
